name: CI/CD

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: |
          docker build --target test -t app-test .

      - name: Run tests
        run: |
          docker run --rm app-test
