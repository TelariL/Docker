name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}

          script: |
            set -e

            cd ~/tasks/docker

            echo "Pulling latest code..."
            git pull origin master

            echo "Building image..."
            podman build -t kubsu .

            echo "Stopping old container..."
            podman stop kubsu || true
            podman rm kubsu || true

            echo "Starting new container..."
            podman run -d \
              --name kubsu \
              --network host \
              --restart=always \
              kubsu

            echo "Waiting for app..."
            sleep 5

            curl -f http://127.0.0.1:8122/users/ || exit 1

            echo "DEPLOY SUCCESS"
